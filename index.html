<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d2233" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Ramadan 2026</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Lato:ital,wght@0,300;0,400;1,300&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-dark:    #08151f;
      --bg-mid:     #0d2233;
      --teal:       #0f6b6b;
      --teal-light: #1a9e8f;
      --gold:       #c9a84c;
      --gold-light: #e8c96e;
      --gold-pale:  #f5e4b3;
      --text:       #e8dcc8;
      --text-dim:   #9e9080;
      --surface:    rgba(255,255,255,0.06);
      --surface-hover: rgba(255,255,255,0.11);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg-dark);
      color: var(--text);
      font-family: 'Lato', sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(15,107,107,0.45) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 110%, rgba(201,168,76,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 10% 90%,  rgba(10,40,60,0.6) 0%, transparent 70%),
        linear-gradient(175deg, #0d2233 0%, #08151f 55%, #0a1e2a 100%);
    }

    .page {
      position: fixed; inset: 0; z-index: 10;
      overflow-y: auto;
      transition: transform 0.5s cubic-bezier(0.77,0,0.18,1), opacity 0.5s ease;
    }
    .page.hidden { pointer-events: none; opacity: 0; transform: translateY(30px); }

    #home { display: flex; flex-direction: column; align-items: center; min-height: 100%; padding: 0 0 40px; }

    .header { width: 100%; text-align: center; padding: 40px 24px 20px; }
    .header-title { font-family: 'Cinzel Decorative', serif; font-size: 2.2rem; background: linear-gradient(135deg, var(--gold-light), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .today-card, .time-card {
      margin: 0 20px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 20px;
      width: calc(100% - 40px);
      max-width: 460px;
    }

    .today-card { display: flex; align-items: center; justify-content: space-between; padding: 20px; cursor: pointer; }
    .time-card { display: flex; justify-content: space-around; padding: 15px; text-align: center; }

    .time-label { font-size: 0.6rem; text-transform: uppercase; color: var(--teal-light); margin-bottom: 4px; }
    .time-val { font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--gold-light); }

    .calendar-wrap { width: calc(100% - 40px); max-width: 460px; margin: 10px 20px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .cal-cell {
      aspect-ratio: 1; border-radius: 12px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: var(--surface); transition: 0.3s;
    }
    .cal-cell.past { background: rgba(15,107,107,0.2); cursor: pointer; }
    .cal-cell.today { border: 1px solid var(--gold); box-shadow: 0 0 15px rgba(201,168,76,0.3); cursor: pointer; }
    .cal-cell.future { opacity: 0.3; cursor: default; pointer-events: none; }

    #detail { background: var(--bg-dark); padding-bottom: 40px; }
    .detail-nav { display: flex; justify-content: space-between; padding: 20px; max-width: 560px; margin: 0 auto; }
    .nav-btn { background: var(--surface); border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; border-radius: 20px; cursor: pointer; }
    .nav-btn.disabled { opacity: 0.3; pointer-events: none; }

    .anim { animation: fadeUp 0.5s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="page" id="home">
  <div class="header anim">
    <div class="header-title">Ramadan</div>
    <div class="header-sub" id="hijriYear">1447 H</div>
  </div>

  <div class="today-card anim" id="todayCard">
    <div class="today-left">
      <div class="time-label">Jour</div>
      <div id="todayNum" style="font-size: 1.8rem; color: var(--gold-light); font-family: 'Cinzel';">--</div>
    </div>
    <div class="today-right" style="text-align: right;">
      <div id="todaySurahName" style="font-family: 'Cinzel';">--</div>
      <div id="todaySurahArabic" style="font-family: 'Amiri'; color: var(--gold); font-size: 1.2rem;">--</div>
    </div>
  </div>

  <div class="time-card anim">
    <div class="time-item">
      <div class="time-label">Lever (Imsak)</div>
      <div class="time-val" id="sunriseTime">--:--</div>
    </div>
    <div class="time-item">
      <div class="time-label">Coucher (Iftar)</div>
      <div class="time-val" id="sunsetTime">--:--</div>
    </div>
  </div>

  <div class="calendar-wrap anim">
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<div class="page hidden" id="detail">
  <div style="padding: 20px; text-align: center;">
    <button class="nav-btn" onclick="goHome()">← Retour</button>
    <h2 id="detDay" style="margin-top: 20px; color: var(--teal-light); font-size: 0.8rem; text-transform: uppercase;"></h2>
    <h1 id="detSurah" style="font-family: 'Cinzel Decorative'; font-size: 2rem; color: var(--gold-light); margin: 10px 0;"></h1>
    <div id="detArabic" style="font-family: 'Amiri'; font-size: 2rem; color: var(--gold); margin-bottom: 20px;"></div>
    
    <div style="max-width: 500px; margin: 0 auto; text-align: left; padding: 0 20px;">
      <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border-left: 3px solid var(--gold);">
        <p id="detContext" style="font-style: italic; line-height: 1.6;"></p>
      </div>
      <h3 style="margin: 20px 0 10px; color: var(--teal-light); font-size: 0.9rem;">RÉFLEXION DU JOUR</h3>
      <p id="detReflection" style="line-height: 1.7; color: var(--text);"></p>
    </div>
  </div>

  <div class="detail-nav">
    <button id="prevBtn" class="nav-btn" onclick="navigateDay(-1)">Précédent</button>
    <button id="nextBtn" class="nav-btn" onclick="navigateDay(1)">Suivant</button>
  </div>
</div>

<script>
// DATE DE DÉBUT RÉGLÉE AU 19 FÉVRIER
const RAMADAN_START = new Date(2026, 1, 19); 
const RAMADAN_DAYS = 30;

// INSERTION DES DONNÉES COMPLÈTES (SURAHS)
const SURAHS = [
  { num: 1, name: "Al-Fatiha", arabic: "الفاتحة", context: "L'ouverture du Livre, une prière pour la guidance.", reflection: "Commencez ce mois en demandant sincèrement la direction droite dans chaque action." },
  { num: 2, name: "Al-Baqara", arabic: "البقرة", context: "La plus longue sourate, contenant les lois et la guidance majeure.", reflection: "Le jeûne a été prescrit pour atteindre la piété (Taqwa). Méditez sur ce but." },
  { num: 3, name: "Al-Imran", arabic: "آل عمران", context: "La famille d'Imran, focus sur la foi et la persévérance.", reflection: "Restez ferme dans vos convictions, même face aux difficultés du quotidien." },
  { num: 4, name: "An-Nisa", arabic: "النساء", context: "Droits des femmes et justice sociale.", reflection: "La justice commence au sein de la famille et envers les plus vulnérables." },
  { num: 5, name: "Al-Ma'ida", arabic: "المائدة", context: "Les contrats et l'accomplissement de la religion.", reflection: "Honorez vos engagements envers Dieu et envers les hommes." },
  { num: 6, name: "Al-An'am", arabic: "الأنعام", context: "L'unicité de Dieu à travers la création.", reflection: "Observez la nature pour y trouver les signes de la grandeur divine." },
  { num: 7, name: "Al-A'raf", arabic: "الأعراف", context: "L'histoire des prophètes et les sommets de la foi.", reflection: "Apprenez du passé pour mieux construire votre futur spirituel." },
  { num: 8, name: "Al-Anfal", arabic: "الأنفal", context: "La confiance en Dieu lors des batailles de la vie.", reflection: "La vraie force réside dans la confiance absolue en la volonté divine." },
  { num: 9, name: "At-Tawba", arabic: "التوبة", context: "Le repentir et la sincérité du cœur.", reflection: "Il n'est jamais trop tard pour revenir vers Dieu avec un cœur pur." },
  { num: 10, name: "Yunus", arabic: "يونس", context: "La patience et la délivrance de Jonas.", reflection: "Même au fond des ténèbres, l'invocation sincère apporte la lumière." },
  { num: 11, name: "Hud", arabic: "هود", context: "La droiture ordonnée aux prophètes.", reflection: "Soyez droit comme il vous l'a été ordonné, sans dépasser les limites." },
  { num: 12, name: "Yusuf", arabic: "يوسف", context: "L'histoire de Joseph, de l'épreuve à la royauté.", reflection: "La patience et la bienfaisance mènent toujours à la réussite." },
  { num: 13, name: "Ar-Ra'd", arabic: "الرعد", context: "Le tonnerre qui glorifie son Seigneur.", reflection: "Dieu ne change pas l'état d'un peuple tant qu'ils ne changent pas ce qui est en eux." },
  { num: 14, name: "Ibrahim", arabic: "إبراهيم", context: "La gratitude et la parole immuable d'Abraham.", reflection: "Si vous êtes reconnaissants, J'augmenterai mes bienfaits pour vous." },
  { num: 15, name: "Al-Hijr", arabic: "الحجر", context: "La protection divine du message.", reflection: "Adorez votre Seigneur jusqu'à ce que vous vienne la certitude." },
  { num: 16, name: "An-Nahl", arabic: "النحل", context: "Les bienfaits infinis représentés par l'abeille.", reflection: "Réfléchissez aux petites bénédictions de la vie que nous oublions souvent." },
  { num: 17, name: "Al-Isra", arabic: "الإسراء", context: "Le voyage nocturne et l'honneur des parents.", reflection: "Traitez vos parents avec une immense bonté et humilité." },
  { num: 18, name: "Al-Kahf", arabic: "الكهف", context: "Les gens de la caverne et la protection contre les épreuves.", reflection: "Recherchez la compagnie de ceux qui invoquent leur Seigneur matin et soir." },
  { num: 19, name: "Maryam", arabic: "مريم", context: "La dévotion de Marie et la naissance de Jésus.", reflection: "Rien n'est impossible à Dieu, Il dit 'Sois' et la chose est." },
  { num: 20, name: "Ta-Ha", arabic: "طه", context: "L'appel de Moïse et la sérénité du cœur.", reflection: "Le Coran n'a pas été descendu pour vous rendre malheureux, mais comme rappel." },
  { num: 21, name: "Al-Anbiya", arabic: "الأنبياء", context: "Le message universel de tous les prophètes.", reflection: "Nous vous éprouvons par le mal et par le bien à titre de tentation." },
  { num: 22, name: "Al-Hajj", arabic: "الحج", context: "Le pèlerinage et l'égalité devant Dieu.", reflection: "La piété du cœur est la seule chose qui parvient réellement à Dieu." },
  { num: 23, name: "Al-Mu'minun", arabic: "المؤمنون", context: "Les qualités des croyants qui réussissent.", reflection: "Le succès véritable se trouve dans la prière humble et l'honnêteté." },
  { num: 24, name: "An-Nur", arabic: "النور", context: "La lumière de Dieu dans les cieux et la terre.", reflection: "Cultivez la lumière intérieure par la pureté des yeux et du cœur." },
  { num: 25, name: "Al-Furqan", arabic: "الفرقان", context: "Le discernement entre le vrai et le faux.", reflection: "Les serviteurs du Miséricordieux sont ceux qui marchent humblement." },
  { num: 26, name: "Ash-Shu'ara", arabic: "الشعراء", context: "La force de la vérité face à la poésie vaine.", reflection: "Placez votre confiance en le Puissant, le Très Miséricordieux." },
  { num: 27, name: "An-Naml", arabic: "النمل", context: "La sagesse de Salomon et la fourmi.", reflection: "Chaque créature, aussi petite soit-elle, a un rôle dans l'univers." },
  { num: 28, name: "Al-Qasas", arabic: "القصص", context: "Le récit détaillé de Moïse.", reflection: "Dieu guide vers Lui celui qui cherche sincèrement la vérité." },
  { num: 29, name: "Al-Ankabut", arabic: "العنكبوت", context: "La fragilité de la toile d'araignée (fausses idoles).", reflection: "La foi sera éprouvée pour distinguer le sincère du menteur." },
  { num: 30, name: "Ar-Rum", arabic: "الروم", context: "Les signes de Dieu dans la diversité du monde.", reflection: "La création est un cycle constant de renouvellement et de vie." }
];

let currentDay = 1;

function getRamadanDay(date) {
  const d = new Date(date); d.setHours(0,0,0,0);
  const start = new Date(RAMADAN_START); start.setHours(0,0,0,0);
  const diff = Math.floor((d - start) / 86400000) + 1;
  return diff;
}

// CORRECTION : LOGIQUE DES CLICS STRICTE
function buildCalendar() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const todayNum = getRamadanDay(new Date());

  for (let day = 1; day <= RAMADAN_DAYS; day++) {
    const cell = document.createElement('div');
    const date = new Date(RAMADAN_START);
    date.setDate(date.getDate() + day - 1);

    let state = 'future';
    if (day < todayNum) state = 'past';
    else if (day === todayNum) state = 'today';

    cell.className = `cal-cell ${state}`;
    cell.innerHTML = `<span style="font-size: 0.9rem; font-weight: bold;">${date.getDate()}</span><span style="font-size: 0.6rem; margin-top:2px;">J${day}</span>`;
    
    // Uniquement cliquable si le jour est passé ou aujourd'hui
    if (state !== 'future') {
      cell.onclick = () => openDetail(day);
    }
    grid.appendChild(cell);
  }
}

function openDetail(day) {
  currentDay = day;
  const s = SURAHS[day-1];
  document.getElementById('detDay').textContent = `Jour ${day} du Ramadan`;
  document.getElementById('detSurah').textContent = s.name;
  document.getElementById('detArabic').textContent = s.arabic;
  document.getElementById('detContext').textContent = s.context;
  document.getElementById('detReflection').textContent = s.reflection;

  const todayNum = getRamadanDay(new Date());
  document.getElementById('nextBtn').classList.toggle('disabled', day >= todayNum || day >= 30);
  document.getElementById('prevBtn').classList.toggle('disabled', day <= 1);

  document.getElementById('home').classList.add('hidden');
  document.getElementById('detail').classList.remove('hidden');
}

function navigateDay(dir) {
  const next = currentDay + dir;
  if (next >= 1 && next <= getRamadanDay(new Date()) && next <= 30) {
    openDetail(next);
  }
}

function goHome() {
  document.getElementById('detail').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
}

// HORAIRES SOLAIRES AUTOMATIQUES
async function fetchTimes() {
  navigator.geolocation.getCurrentPosition(async (pos) => {
    const res = await fetch(`https://api.sunrise-sunset.org/json?lat=${pos.coords.latitude}&lng=${pos.coords.longitude}&formatted=0`);
    const data = await res.json();
    if(data.status === "OK") {
      const sunrise = new Date(data.results.sunrise).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
      const sunset = new Date(data.results.sunset).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
      document.getElementById('sunriseTime').textContent = sunrise;
      document.getElementById('sunsetTime').textContent = sunset;
    }
  });
}

// INIT
window.onload = () => {
  buildCalendar();
  fetchTimes();
  const day = getRamadanDay(new Date());
  if (day >= 1 && day <= 30) {
    document.getElementById('todayNum').textContent = day;
    document.getElementById('todaySurahName').textContent = SURAHS[day-1].name;
    document.getElementById('todaySurahArabic').textContent = SURAHS[day-1].arabic;
    document.getElementById('todayCard').onclick = () => openDetail(day);
  } else if (day < 1) {
    document.getElementById('todaySurahName').textContent = "Bientôt...";
    document.getElementById('todayNum').textContent = "0";
  }
};
</script>
</body>
</html>
