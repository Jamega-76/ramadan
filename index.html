<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d2233" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Ramadan 2026</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Lato:ital,wght@0,300;0,400;1,300&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-dark:    #08151f;
      --bg-mid:     #0d2233;
      --teal:       #0f6b6b;
      --teal-light: #1a9e8f;
      --gold:       #c9a84c;
      --gold-light: #e8c96e;
      --gold-pale:  #f5e4b3;
      --text:       #e8dcc8;
      --text-dim:   #9e9080;
      --surface:    rgba(255,255,255,0.06);
      --surface-hover: rgba(255,255,255,0.11);
      --accent:     #2ac9a5;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg-dark);
      color: var(--text);
      font-family: 'Lato', sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(15,107,107,0.45) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 110%, rgba(201,168,76,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 10% 90%,  rgba(10,40,60,0.6) 0%, transparent 70%),
        linear-gradient(175deg, #0d2233 0%, #08151f 55%, #0a1e2a 100%);
    }

    /* Pages et structure */
    .page {
      position: fixed; inset: 0; z-index: 10;
      overflow-y: auto;
      transition: transform 0.5s cubic-bezier(0.77,0,0.18,1), opacity 0.5s ease;
    }
    .page.hidden { pointer-events: none; opacity: 0; transform: translateY(30px); }

    #home { display: flex; flex-direction: column; align-items: center; min-height: 100%; padding: 0 0 40px; }

    /* Header */
    .header { width: 100%; text-align: center; padding: 48px 24px 28px; position: relative; }
    .header-title { font-family: 'Cinzel Decorative', serif; font-size: clamp(1.6rem, 6vw, 2.4rem); background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-pale)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
    .header-sub { font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 0.35em; color: var(--teal-light); text-transform: uppercase; }

    /* Cards */
    .today-card, .time-card {
      margin: 0 20px 16px;
      background: linear-gradient(135deg, rgba(15,107,107,0.4) 0%, rgba(26,158,143,0.25) 100%);
      border: 1px solid rgba(201,168,76,0.35);
      border-radius: 20px;
      padding: 20px 24px;
      width: calc(100% - 40px);
      max-width: 460px;
      box-shadow: 0 0 30px rgba(15,107,107,0.2);
    }

    .today-card { display: flex; align-items: center; justify-content: space-between; }
    .time-card { display: flex; justify-content: space-around; text-align: center; padding: 15px 20px; }

    .time-item .time-label { font-size: 0.6rem; text-transform: uppercase; color: var(--teal-light); letter-spacing: 0.1em; margin-bottom: 5px; }
    .time-item .time-val { font-family: 'Cinzel', serif; font-size: 1.2rem; color: var(--gold-light); }

    /* Calendar & Details (conservés de ton code) */
    .calendar-wrap { width: calc(100% - 40px); max-width: 460px; margin: 0 20px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-cell { aspect-ratio: 1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--surface); cursor: pointer; }
    .cal-cell.today { border: 1px solid var(--gold); box-shadow: 0 0 15px var(--gold); }
    
    /* Animations */
    .anim { animation: fadeUp 0.5s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="page" id="home">
  <div class="header anim">
    <div class="header-title">Ramadan</div>
    <div class="header-sub">2026 · 1447 H</div>
  </div>

  <div class="today-card anim" id="todayCard" style="animation-delay: 0.1s">
    <div class="today-left">
      <div id="todayNum" style="font-size: 2rem; color: var(--gold-light); font-family: 'Cinzel';">1</div>
      <div id="todayDate" style="font-size: 0.8rem; color: var(--text-dim);">Jeudi 19 Février</div>
    </div>
    <div class="today-right" style="text-align: right;">
      <div id="todaySurahName" style="font-family: 'Cinzel';">Al-Fatiha</div>
      <div id="todaySurahArabic" style="font-family: 'Amiri'; color: var(--gold);">الفاتحة</div>
    </div>
  </div>

  <div class="time-card anim" style="animation-delay: 0.2s">
    <div class="time-item">
      <div class="time-label">Lever (Imsak)</div>
      <div class="time-val" id="sunriseTime">--:--</div>
    </div>
    <div style="width: 1px; background: rgba(201,168,76,0.2);"></div>
    <div class="time-item">
      <div class="time-label">Coucher (Iftar)</div>
      <div class="time-val" id="sunsetTime">--:--</div>
    </div>
  </div>

  <div class="calendar-wrap anim" style="animation-delay: 0.3s">
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<div class="page hidden" id="detail">
    <button onclick="goHome()" style="margin: 20px; color: var(--gold); background: none; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 20px;">Retour</button>
    <div id="detailContent" style="padding: 20px; text-align: center;">
        <h1 id="detailSurahNameLarge" style="font-family: 'Cinzel Decorative'; color: var(--gold-light);"></h1>
        <p id="detailText" style="margin-top: 20px; line-height: 1.6;"></p>
    </div>
</div>

<script>
const RAMADAN_START = new Date(2026, 1, 19);
const RAMADAN_DAYS = 30;

// Les données des sourates (abrégées ici pour le code, garde ta liste complète)
const SURAHS = [
    { num: 1, name: "Al-Fatiha", arabic: "الفاتحة", meaning: "L'Ouverture", context: "Révélée à La Mecque..." },
    { num: 2, name: "Al-Baqara", arabic: "البقرة", meaning: "La Vache", context: "La plus longue sourate..." },
    // ... Ajoute tes 30 sourates ici
];

// --- LOGIQUE GEOLOCALISATION & HORAIRES ---
async function fetchSolarTimes() {
  if (!navigator.geolocation) {
    console.log("La géolocalisation n'est pas supportée.");
    return;
  }

  navigator.geolocation.getCurrentPosition(async (position) => {
    const lat = position.coords.latitude;
    const lng = position.coords.longitude;
    
    try {
      // Appel à l'API sunrise-sunset.org (Gratuit, pas de clé nécessaire)
      const response = await fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lng}&formatted=0&date=today`);
      const data = await response.json();
      
      if (data.status === "OK") {
        const sunrise = new Date(data.results.sunrise);
        const sunset = new Date(data.results.sunset);

        // Formatage local (ex: 06:42)
        const options = { hour: '2-digit', minute: '2-digit', hour12: false };
        document.getElementById('sunriseTime').textContent = sunrise.toLocaleTimeString('fr-FR', options);
        document.getElementById('sunsetTime').textContent = sunset.toLocaleTimeString('fr-FR', options);
      }
    } catch (error) {
      console.error("Erreur lors de la récupération des horaires:", error);
    }
  });
}

// --- LOGIQUE CALENDRIER ---
function getRamadanDay(date) {
  const d = new Date(date); d.setHours(0,0,0,0);
  const start = new Date(RAMADAN_START); start.setHours(0,0,0,0);
  const diff = Math.floor((d - start) / 86400000) + 1;
  return (diff >= 1 && diff <= RAMADAN_DAYS) ? diff : null;
}

function buildCalendar() {
  const grid = document.getElementById('calGrid');
  const today = new Date(); today.setHours(0,0,0,0);
  
  for (let day = 1; day <= RAMADAN_DAYS; day++) {
    const date = new Date(RAMADAN_START);
    date.setDate(date.getDate() + day - 1);
    
    const cell = document.createElement('div');
    cell.className = `cal-cell ${date.getTime() === today.getTime() ? 'today' : ''}`;
    cell.innerHTML = `<span style="font-size: 0.8rem;">${date.getDate()}</span><span style="font-size: 0.6rem; color: var(--teal-light)">J${day}</span>`;
    
    cell.onclick = () => {
        if (day <= (getRamadanDay(new Date()) || 0) || true) { // Autorise tout pour test
            showDetail(day);
        }
    };
    grid.appendChild(cell);
  }
}

function showDetail(day) {
    const s = SURAHS[day-1] || SURAHS[0];
    document.getElementById('detailSurahNameLarge').textContent = s.name;
    document.getElementById('detailText').textContent = s.context;
    document.getElementById('home').classList.add('hidden');
    document.getElementById('detail').classList.remove('hidden');
}

function goHome() {
    document.getElementById('detail').classList.add('hidden');
    document.getElementById('home').classList.remove('hidden');
}

// Initialisation
window.onload = () => {
  buildCalendar();
  fetchSolarTimes();
  
  // Update header card
  const day = getRamadanDay(new Date());
  if(day) {
      document.getElementById('todayNum').textContent = day;
      document.getElementById('todaySurahName').textContent = SURAHS[day-1].name;
      document.getElementById('todaySurahArabic').textContent = SURAHS[day-1].arabic;
  }
};
</script>

</body>
</html>
